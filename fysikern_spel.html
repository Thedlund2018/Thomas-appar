<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYSIKERN — Fysik 1 Gy11</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6F9; --surface:#fff; --border:#D1D9E0; --bs:#B0BCC8;
  --text:#1A2332; --muted:#4A5568;
  --phys:#0D4F8C; --phys-bg:#E8F1FB; --phys-bd:#A3C4E8;
  --ok:#1A7A4A; --ok-bg:#E8F5EE; --ok-bd:#A3D4B5;
  --err:#C0392B; --err-bg:#FDECEA; --err-bd:#F5A89A;
  --warn:#92600A; --warn-bg:#FEF3E2; --warn-bd:#F5C97A;
  --gold:#D97706; --silver:#6B7280; --bronze:#92600A;
  --accent:#7C3AAE; --accent-bg:#F3E8FF;
  --info-bg:#EBF4FD;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);font-size:16px;min-height:100vh;}
h1,h2,h3,.rank-title{font-family:'Syne',sans-serif;}

/* NAV */
#header{padding:12px 20px;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--phys);}
.rank-pill{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bs);border-radius:20px;padding:6px 14px;}
.rank-icon{font-size:18px;}
.rank-label{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--phys);}
.xp-bar-wrap{flex:1;max-width:120px;}
.xp-track{background:var(--border);border-radius:5px;height:6px;}
.xp-fill{height:6px;border-radius:5px;background:var(--phys);transition:width 0.5s ease;}
.xp-label{font-size:10px;color:var(--muted);margin-top:2px;}

/* APP */
#app{max-width:760px;margin:0 auto;padding:24px 18px 80px;}
.fade-in{animation:fadeIn 0.35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.card.phys-accent{border-left:4px solid var(--phys);}
.card.ok-accent{border-left:4px solid var(--ok);}
.card.warn-accent{border-left:4px solid var(--gold);}

/* SECTION HEADER */
.sec-hd{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;color:var(--text);}
.sec-sub{color:var(--muted);font-size:13px;line-height:1.55;margin-bottom:16px;}
.chip{display:inline-block;padding:3px 11px;border-radius:12px;font-size:11px;font-weight:800;font-family:'Syne',sans-serif;}
.chip-phys{background:var(--phys-bg);color:var(--phys);border:1px solid var(--phys-bd);}
.chip-gold{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd);}

/* PHYSICIST BIO */
.bio-card{background:linear-gradient(135deg,#EBF4FD 0%,#F3E8FF 100%);border:2px solid var(--phys-bd);border-radius:14px;padding:20px 22px;margin-bottom:16px;display:flex;gap:18px;align-items:flex-start;}
.bio-portrait{font-size:52px;flex-shrink:0;}
.bio-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--phys);margin-bottom:2px;}
.bio-years{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.bio-text{font-size:13px;color:var(--text);line-height:1.65;}
.bio-quote{font-style:italic;color:var(--phys);font-size:13px;border-left:3px solid var(--phys);padding-left:10px;margin-top:8px;}

/* CONCEPT CARDS */
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.concept-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--phys);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.concept-body{font-size:14px;line-height:1.65;color:var(--text);}
.formula{background:var(--phys-bg);border:1px solid var(--phys-bd);border-radius:8px;padding:10px 14px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--phys);text-align:center;margin:8px 0;letter-spacing:1px;}
.formula-explain{font-size:12px;color:var(--muted);text-align:center;margin-top:4px;}

/* PRACTICE / QUIZ QUESTIONS */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:14px;}
.q-meta{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.q-txt{font-size:17px;font-weight:600;line-height:1.45;color:var(--text);margin-bottom:16px;}
.q-img{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;}
.opt{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;font-size:14px;transition:all 0.12s;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:10px;}
.opt-letter{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;background:var(--bg);border:1.5px solid var(--bs);color:var(--muted);transition:all 0.12s;}
.opt:hover:not(.locked){border-color:var(--phys);background:var(--phys-bg);}
.opt:hover:not(.locked) .opt-letter{background:var(--phys);color:#fff;border-color:var(--phys);}
.opt.correct{border-color:var(--ok);background:var(--ok-bg);}
.opt.correct .opt-letter{background:var(--ok);color:#fff;border-color:var(--ok);}
.opt.wrong{border-color:var(--err);background:var(--err-bg);}
.opt.wrong .opt-letter{background:var(--err);color:#fff;border-color:var(--err);}
.opt.show-correct{border-color:var(--ok);background:var(--ok-bg);opacity:0.7;}
.opt.show-correct .opt-letter{background:var(--ok);color:#fff;border-color:var(--ok);}
.opt.locked{pointer-events:none;}

/* NUMERIC INPUT */
.num-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.num-in{background:var(--bg);border:2px solid var(--bs);border-radius:8px;padding:10px 13px;font-size:17px;font-family:'Syne',sans-serif;font-weight:700;width:140px;text-align:right;color:var(--text);}
.num-in:focus{outline:none;border-color:var(--phys);background:var(--phys-bg);}

/* FEEDBACK */
.fb{padding:13px 16px;border-radius:10px;margin-top:12px;font-size:14px;font-weight:500;line-height:1.55;}
.fb.ok{background:var(--ok-bg);color:#0E5C30;border:1px solid var(--ok-bd);}
.fb.err{background:var(--err-bg);color:#9B2010;border:1px solid var(--err-bd);}
.fb.socratic{background:var(--accent-bg);border:2px dashed var(--accent);color:var(--accent);border-radius:10px;padding:14px 16px;margin-top:10px;}
.fb strong{font-weight:700;display:block;margin-bottom:2px;}
.fb .hint-q{font-style:italic;margin-top:6px;font-size:13px;}

/* XP REWARD BURST */
.xp-burst{display:inline-block;background:var(--gold);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;padding:4px 12px;border-radius:20px;margin-left:8px;animation:pop 0.4s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}

/* RANK UP SCREEN */
.rank-up{text-align:center;padding:32px 16px;}
.rank-up-icon{font-size:64px;margin-bottom:12px;animation:spin 0.6s ease;}
@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
.rank-up-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--phys);}
.rank-up-sub{color:var(--muted);font-size:15px;margin-top:6px;}
.rank-stars{font-size:28px;letter-spacing:4px;margin:10px 0;}

/* PROGRESS TABS */
.moment-tabs{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;}
.mt{padding:8px 13px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;color:var(--muted);border:1.5px solid var(--border);background:var(--surface);white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.mt.active{background:var(--phys);color:#fff;border-color:var(--phys);}
.mt.done{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd);}
.mt.locked{opacity:0.4;cursor:not-allowed;}

/* PROGRESS BAR */
.prog-wrap{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.prog-track{flex:1;background:var(--border);border-radius:5px;height:7px;}
.prog-fill{height:7px;border-radius:5px;background:var(--phys);transition:width 0.4s;}
.prog-lbl{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}

/* BUTTONS */
.btn{background:var(--phys);color:#fff;border:none;border-radius:9px;padding:12px 22px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.15s;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-full{width:100%;margin-top:12px;padding:14px;}
.btn-ok{background:var(--ok);}
.btn-sec{background:var(--surface);border:2px solid var(--bs);color:var(--text);}
.btn-sec:hover{border-color:var(--phys);color:var(--phys);}
.btn-gold{background:var(--gold);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* TEST RESULT */
.score-c{width:88px;height:88px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px;}
.score-c.pass{background:var(--ok-bg);border:5px solid var(--ok);}
.score-c.fail{background:var(--err-bg);border:5px solid var(--err);}
.score-pct{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.score-c.pass .score-pct{color:var(--ok);}
.score-c.fail .score-pct{color:var(--err);}

/* QUIZ REVIEW */
.review-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.review-row:last-child{border-bottom:none;}
.review-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.sbadge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800;font-family:'Syne',sans-serif;}
.sb-ok{background:var(--ok-bg);color:var(--ok);}
.sb-err{background:var(--err-bg);color:var(--err);}

/* INTRO SCREEN */
.intro-hero{text-align:center;padding:36px 16px 24px;}
.intro-hero h1{font-size:clamp(30px,6vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;}
.intro-hero h1 span{color:var(--phys);}
.intro-sub{color:var(--muted);font-size:16px;margin:10px auto 24px;max-width:480px;line-height:1.6;}
.moment-preview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0;}
.mp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;text-align:left;}
.mp-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--phys);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.mp-title{font-weight:700;font-size:14px;color:var(--text);}
.mp-phys{font-size:12px;color:var(--muted);}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* PRINT */
@media print{#header{display:none!important;}}
@media(max-width:500px){.moment-preview{grid-template-columns:1fr;}.bio-card{flex-direction:column;}}
</style>
</head>
<body>

<div id="header">
  <div class="logo">FYS<span>IKERN</span></div>
  <div class="rank-pill">
    <div class="rank-icon" id="rankIcon">🔭</div>
    <div>
      <div class="rank-label" id="rankLabel">Nybörjare</div>
      <div class="xp-bar-wrap">
        <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
        <div class="xp-label" id="xpLabel">0 XP</div>
      </div>
    </div>
  </div>
</div>

<div id="app"></div>

<script>
// ============================================================
// RANKS
// ============================================================
const RANKS = [
  { min:0,    icon:'🔭', label:'Nybörjare',  next:150  },
  { min:150,  icon:'📐', label:'Lärlingen',  next:350  },
  { min:350,  icon:'⚗️',  label:'Studenten',  next:650  },
  { min:650,  icon:'🔬', label:'Kandidaten', next:1050 },
  { min:1050, icon:'📊', label:'Licentiaten',next:1550 },
  { min:1550, icon:'🎓', label:'Doktorn',    next:2200 },
  { min:2200, icon:'⚡', label:'Fysikern',   next:9999 },
];
function getRank(xp) { return [...RANKS].reverse().find(r => xp >= r.min) || RANKS[0]; }

// ============================================================
// GAME DATA — 6 MOMENTS
// ============================================================
const MOMENTS = [
{
  id: 1,
  title: "Kinematik",
  subtitle: "Rörelse, hastighet och acceleration",
  icon: "🏃",
  color: "#0D4F8C",
  physicist: {
    name: "Galileo Galilei",
    years: "1564–1642",
    portrait: "🌟",
    text: "Galileo Galilei föddes i Pisa, Italien och revolutionerade vår syn på rörelse. Han var bland de första att använda experiment och matematik för att studera naturen — istället för att bara spekulera filosofiskt. Hans berömda experiment på det lutande tornet i Pisa (troligen en legend, men principen stämmer) visade att föremål med olika massa faller lika snabbt. Han uppfann ett tidigt teleskop och stödde Kopernikus heliocentriska världsbild — vilket ledde till att han dömdes av kyrkan till husarrest. Galileo lade grunden för hela den klassiska mekaniken som Newton sedan fullbordade.",
    quote: "Du kan inte lära någon något; du kan bara hjälpa dem att finna det inom sig själva."
  },
  concepts: [
    {
      title: "📍 Hastighet",
      icon: "📍",
      body: "Hastighet är hur snabbt ett föremål rör sig — avstånd per tidsenhet. Medelhastighet beräknas som total sträcka delat på total tid.",
      formula: "v = s / t",
      formulaExplain: "v = hastighet (m/s)  ·  s = sträcka (m)  ·  t = tid (s)"
    },
    {
      title: "⚡ Acceleration",
      icon: "⚡",
      body: "Acceleration beskriver hur snabbt hastigheten förändras. Positiv acceleration = ökar hastighet. Negativ acceleration (retardation) = minskar hastighet. Jordens tyngdacceleration g ≈ 9,8 m/s².",
      formula: "a = Δv / t = (v − v₀) / t",
      formulaExplain: "a = acceleration (m/s²)  ·  Δv = hastighetsförändring  ·  t = tid (s)"
    },
    {
      title: "📏 Rörelseformlerna",
      icon: "📏",
      body: "För jämnt accelererad rörelse (konstant acceleration) gäller tre grundformler. Den viktigaste är den som kopplar sträcka, begynnelsehastighet, acceleration och tid.",
      formula: "s = v₀·t + ½·a·t²",
      formulaExplain: "Gäller för konstant acceleration. Om v₀=0: s = ½·a·t²"
    }
  ],
  practice: [
    {
      id: "k1", type: "mc",
      q: "En cyklist rör sig 60 meter på 12 sekunder. Vad är cyklist ens medelhastighet?",
      opts: ["A) 3 m/s", "B) 5 m/s", "C) 720 m/s", "D) 0,2 m/s"],
      correct: "B",
      explain: "v = s/t = 60/12 = 5 m/s. Enkel division — sträcka delat på tid.",
      socratic: "Vilken formel kopplar ihop sträcka, hastighet och tid? Om du vet s och t — vad löser du ut?",
      praise: "Precis rätt! v = s/t är grundstenen i all kinematik."
    },
    {
      id: "k2", type: "mc",
      q: "En boll accelererar från stillastående (v₀ = 0) med a = 2 m/s². Hur lång sträcka har den rullat efter 4 sekunder?",
      opts: ["A) 8 m", "B) 16 m", "C) 32 m", "D) 4 m"],
      correct: "B",
      explain: "s = ½·a·t² = ½·2·4² = ½·2·16 = 16 m. Kom ihåg: t² — kvadrera tiden!",
      socratic: "Vilken formel gäller när v₀=0 och accelerationen är konstant? Vad händer med sträckan om du fördubblar tiden?",
      praise: "Utmärkt! ½·a·t² sitter nu. Notera: om t fördubblas → s ökar fyra gånger (t²)."
    },
    {
      id: "k3", type: "mc",
      q: "En bil ökar sin hastighet från 20 m/s till 30 m/s på 5 sekunder. Vad är accelerationen?",
      opts: ["A) 1 m/s²", "B) 6 m/s²", "C) 2 m/s²", "D) 10 m/s²"],
      correct: "C",
      explain: "a = (v−v₀)/t = (30−20)/5 = 10/5 = 2 m/s². Hastighetsförändringen delat på tid.",
      socratic: "Vad menas med 'förändring i hastighet'? Hur beräknar du en förändring (Δ)?",
      praise: "Korrekt! Δv = 10 m/s, t = 5 s → a = 2 m/s². Du tänker som Galileo!"
    },
    {
      id: "k4", type: "mc",
      q: "Galileo visade experimentellt att alla föremål faller lika snabbt (i vakuum). Vilken kraft är ansvarig för att föremål faller mot marken?",
      opts: ["A) Magnetkraft", "B) Tyngdkraft (gravitation)", "C) Friktionskraft", "D) Elektrisk kraft"],
      correct: "B",
      explain: "Tyngdkraften (gravitationen) drar alla föremål mot jordens centrum med g ≈ 9,8 m/s². I vakuum, utan luftmotstånd, faller en fjäder och ett stenblock exakt lika snabbt.",
      socratic: "Vad observerade Galileo när han tappade föremål av olika massa? Vad beror skillnaden i fallhastighet i luft egentligen på?",
      praise: "Rätt! Tyngdkraften ger alla föremål samma acceleration g ≈ 9,8 m/s² — oberoende av massa."
    }
  ],
  quiz: [
    { id:"kq1", q:"Enhet för hastighet är:", opts:["A) m/s²","B) kg·m","C) m/s","D) N"], correct:"C", explain:"Hastighet = sträcka/tid = meter/sekund = m/s. m/s² är enheten för acceleration." },
    { id:"kq2", q:"v = 0, a = 10 m/s², t = 3 s. Vilken sträcka har föremålet rört sig?", opts:["A) 30 m","B) 15 m","C) 45 m","D) 90 m"], correct:"C", explain:"s = ½·a·t² = ½·10·9 = 45 m." },
    { id:"kq3", q:"Vad menas med retardation?", opts:["A) Konstant hastighet","B) Negativ acceleration — hastigheten minskar","C) Rörelse bakåt","D) Noll hastighet"], correct:"B", explain:"Retardation = negativ acceleration. Hastigheten minskar men riktningen kan vara positiv." },
    { id:"kq4", q:"En bil kör 100 km på 2 timmar. Medelhastigheten är:", opts:["A) 200 km/h","B) 50 km/h","C) 100 km/h","D) 150 km/h"], correct:"B", explain:"v = s/t = 100/2 = 50 km/h." },
    { id:"kq5", q:"Jordens tyngdacceleration g är ungefär:", opts:["A) 9,8 m/s","B) 9,8 m/s²","C) 9,8 N","D) 9,8 kg"], correct:"B", explain:"g ≈ 9,8 m/s² — acceleration (meter per sekund i kvadrat), inte hastighet." },
  ],
  test: [
    { id:"kt1", q:"En löpare accelererar från 0 till 8 m/s på 4 s. Beräkna accelerationen.", opts:["A) 32 m/s²","B) 4 m/s²","C) 2 m/s²","D) 0,5 m/s²"], correct:"C", explain:"a = Δv/t = 8/4 = 2 m/s²." },
    { id:"kt2", q:"Vilket påstående om fritt fall (vakuum) är korrekt?", opts:["A) Tyngre föremål faller snabbare","B) Alla föremål faller med samma acceleration g","C) Acceleration beror på form","D) Föremål faller med konstant hastighet"], correct:"B", explain:"Galileos insikt: i vakuum faller alla föremål med g ≈ 9,8 m/s², oberoende av massa." },
    { id:"kt3", q:"Formeln s = v₀t + ½at² används för:", opts:["A) Konstant hastighet","B) Jämnt accelererad rörelse","C) Cirkulär rörelse","D) Slumpmässig rörelse"], correct:"B", explain:"Formeln gäller för jämnt accelererad rörelse — konstant acceleration." },
    { id:"kt4", q:"En sten faller från ett torn. Efter 3 s, vilken hastighet har stenen? (g=10 m/s², v₀=0)", opts:["A) 10 m/s","B) 30 m/s","C) 90 m/s","D) 15 m/s"], correct:"B", explain:"v = v₀ + at = 0 + 10·3 = 30 m/s." },
    { id:"kt5", q:"Vad är korrekt enhet för acceleration?", opts:["A) m/s","B) km/h","C) m/s²","D) N/kg"], correct:"C", explain:"Acceleration = hastighetsförändring/tid = (m/s)/s = m/s²." },
  ]
},
{
  id: 2,
  title: "Newtons lagar",
  subtitle: "Kraft, massa och rörelse",
  icon: "⚙️",
  color: "#C0392B",
  physicist: {
    name: "Isaac Newton",

function addXP(amount) {
  GS.xp += amount;
  updateRankHeader();
}
function updateRankHeader() {
  const rank = getRank(GS.xp);
  const next = rank.next;
  const prev = rank.min;
  const pct = next < 9999 ? Math.round((GS.xp - prev) / (next - prev) * 100) : 100;
  document.getElementById('rankIcon').textContent = rank.icon;
  document.getElementById('rankLabel').textContent = rank.label;
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('xpLabel').textContent = GS.xp + ' XP';
}

function render() {
  const app = document.getElementById('app');
  app.className = 'fade-in';
  void app.offsetWidth;
  app.className = 'fade-in';
  if (GS.screen === 'intro') renderIntro(app);
  else if (GS.screen === 'moment') renderMoment(app);
  else if (GS.screen === 'quiz') renderQuiz(app);
  else if (GS.screen === 'quizreview') renderQuizReview(app);
  else if (GS.screen === 'test') renderTest(app);
  else if (GS.screen === 'testresult') renderTestResult(app);
  else if (GS.screen === 'testretry') renderTestRetry(app);
  else if (GS.screen === 'rankup') renderRankUp(app);
  else if (GS.screen === 'done') renderDone(app);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

    <span style="font-size:12px;color:var(--muted)">${phaseLabel(ph)}</span>
  </div>`;

  if (ph === 'bio') html += renderBio(m);
  else if (ph.startsWith('concept')) html += renderConcept(m);
  else if (ph === 'practice') html += renderPractice(m);
  app.innerHTML = html;
}

function phaseLabel(ph) {
  if (ph==='bio') return '👤 Fysikern bakom momentet';
  if (ph.startsWith('concept')) return '📖 Grundbegrepp';
  if (ph==='practice') return '✏️ Öva';
  return ph;
}

function renderBio(m) {
  return `
  <div class="bio-card">
    <div class="bio-portrait">${m.physicist.portrait}</div>
    <div>
      <div class="bio-name">${m.physicist.name}</div>
      <div class="bio-years">${m.physicist.years}</div>
      <div class="bio-text">${m.physicist.text}</div>
      <div class="bio-quote">"${m.physicist.quote}"</div>
    </div>
  </div>
  <div class="btn-row"><button class="btn btn-full" onclick="GS.phase='concept0';GS.conceptIdx=0;render()">📖 GÅ TILL BEGREPPEN →</button></div>`;
}

function renderConcept(m) {
  const idx = parseInt(GS.phase.replace('concept',''));
  const c = m.concepts[idx];
  const total = m.concepts.length;
  const isLast = idx === total - 1;
  return `
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" style="width:${Math.round((idx+1)/total*100)}%"></div></div>
    <div class="prog-lbl">Begrepp ${idx+1} av ${total}</div>
  </div>
  <div class="concept-card" style="border-left:4px solid ${m.color}">
    <div class="concept-title" style="color:${m.color}">${c.title}</div>
    <div class="concept-body">${c.body}</div>
    <div class="formula">${c.formula}</div>
    <div class="formula-explain">${c.formulaExplain}</div>
  </div>
  <div class="btn-row">
    ${idx > 0 ? `<button class="btn btn-sec" onclick="GS.phase='concept${idx-1}';render()">← Föregående</button>` : ''}
    ${isLast
      ? `<button class="btn btn-full btn-ok" onclick="GS.phase='practice';GS.practiceIdx=0;render()">✏️ BÖRJA ÖVAL →</button>`
      : `<button class="btn btn-full" onclick="GS.phase='concept${idx+1}';render()">NÄSTA BEGREPP →</button>`}
  </div>`;
}

function renderPractice(ignored) {
  const m = MOMENTS[GS.moment];
  const questions = m.practice;
  const total = questions.length;
  const allDone = GS.practiceIdx >= total;

  if (allDone) {
    return `
    <div class="card ok-accent" style="text-align:center;padding:28px">
      <div style="font-size:42px">🎉</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:10px 0 6px">Övningarna klara!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Nu är det dags för quizet. Du måste svara rätt på alla frågor för att gå vidare.</p>
      <button class="btn btn-full btn-ok" onclick="startQuiz()">📋 STARTA QUIZET →</button>
    </div>`;
  }

  const q = questions[GS.practiceIdx];
  const res = GS.practiceResults[q.id];
  const answered = res !== undefined;
  const socShown = GS.socraticShown[q.id];
  const LETTERS = ['A','B','C','D'];

  return `
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" style="width:${Math.round(GS.practiceIdx/total*100)}%"></div></div>
    <div class="prog-lbl">Uppgift ${GS.practiceIdx+1} av ${total}</div>
  </div>
  <div class="q-card ${answered && res.correct ? 'ok-accent' : ''}">
    <div class="q-meta">
      <span class="chip chip-phys">Övning</span>
      <span>${m.title}</span>
    </div>
    <div class="q-txt">${q.q}</div>
    <div class="options">
      ${q.opts.map((opt, i) => {
        const letter = LETTERS[i];
        const isChosen = answered && res.chosen === letter;
        const isCorrect = letter === q.correct;
        let cls = '';
        if (answered) {
          if (isChosen && isCorrect) cls = 'correct locked';
          else if (isChosen && !isCorrect) cls = 'wrong locked';
          else if (isCorrect) cls = 'show-correct locked';
          else cls = 'locked';
        }
        return `<button class="opt ${cls}" onclick="${answered ? '' : `practicePick('${q.id}','${letter}')`}">
          <div class="opt-letter">${answered&&isCorrect?'✓':answered&&isChosen&&!isCorrect?'✗':letter}</div>
          <div>${opt.replace(/^[A-D]\)\s*/,'')}</div>
        </button>`;
      }).join('')}
    </div>
    ${answered && res.correct ? `
      <div class="fb ok">
        <strong>${randFrom(PRAISE)} <span class="xp-burst">+${XP_PRACTICE_CORRECT} XP</span></strong>
        ${q.praise}
      </div>
      <div class="btn-row">
        <button class="btn btn-full" onclick="practiceNext()">${GS.practiceIdx+1 < total ? 'NÄSTA UPPGIFT →' : '🎉 ALLA KLARA →'}</button>
      </div>` : ''}
    ${answered && !res.correct && !socShown ? `
      <div class="fb socratic">
        <strong>🤔 Tänk som en fysiker — Sokratisk fråga:</strong>
        <div class="hint-q">${q.socratic}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-full" onclick="practiceRetry('${q.id}')">🔄 FÖRSÖK IGEN</button>
      </div>` : ''}
    ${answered && !res.correct && socShown ? `
      <div class="fb socratic">
        <strong>🤔 Sokratisk fråga:</strong>
        <div class="hint-q">${q.socratic}</div>
      </div>
      <div class="fb err" style="margin-top:8px">
        <strong>📖 Förklaring:</strong> ${q.explain}
      </div>
      <div class="btn-row">
        <button class="btn btn-full" onclick="practiceNext()">${GS.practiceIdx+1 < total ? 'NÄSTA UPPGIFT →' : '🎉 ALLA KLARA →'}</button>
      </div>` : ''}
  </div>`;
}

function practicePick(qid, letter) {
  const m = MOMENTS[GS.moment];
  const q = m.practice.find(x => x.id === qid);
  const correct = letter === q.correct;
  GS.practiceResults[qid] = { correct, chosen: letter, attempts: (GS.practiceResults[qid]?.attempts||0)+1 };
  if (correct) addXP(XP_PRACTICE_CORRECT);
  render();
}

function practiceRetry(qid) {
  GS.socraticShown[qid] = true;
  GS.practiceResults[qid] = undefined;
  render();
}

function practiceNext() {
  GS.practiceIdx++;
  const m = MOMENTS[GS.moment];
  if (GS.practiceIdx >= m.practice.length) {
    // Show "all done" card via renderPractice (allDone branch) — stay in moment/practice phase
    // practiceIdx is now >= total so renderPractice will show the done card
  }
  render();
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz() {
  GS.quizResults = {};
  GS.quizNeedsReview = [];
  GS.screen = 'quiz';
  GS.quizCurrentIdx = 0;
  render();
}

function renderQuiz(app) {
  const m = MOMENTS[GS.moment];
  const isReview = GS.quizNeedsReview.length > 0;
  const questions = isReview
    ? m.quiz.filter(q => GS.quizNeedsReview.includes(q.id))
    : m.quiz;

  const unanswered = questions.filter(q => GS.quizResults[q.id] === undefined);
  const done = questions.length - unanswered.length;

  if (unanswered.length === 0 && questions.length > 0) {
    const allCorrect = questions.every(q => GS.quizResults[q.id]?.correct);
    if (allCorrect) {
      addXP(XP_QUIZ_PASS);
      GS.quizNeedsReview = [];
      GS.screen = 'test';
      GS.testResults = {};
      GS.testNeedsRetry = [];
      GS.testRetryAnswered = false;
      render(); return;
    }
    GS.screen = 'quizreview';
    render(); return;
  }

  const q = unanswered[0];
  const res = GS.quizResults[q.id];
  const answered = res !== undefined;
  const LETTERS = ['A','B','C','D'];

  app.innerHTML = `
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-sec" style="padding:7px 13px;font-size:12px" onclick="GS.screen='intro';render()">← Alla moment</button>
    <span class="chip chip-phys">${isReview ? '🔄 Quiz — repetition' : '📋 Quiz'}</span>
    <span style="font-size:12px;color:var(--muted)">${m.title} · Alla rätt för att gå vidare</span>
  </div>
  ${isReview ? `<div class="fb warn" style="margin-bottom:12px"><strong>🔄 Repetition!</strong> Bara de frågor du hade fel på. Klara dem alla.</div>` : ''}
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" style="width:${Math.round(done/questions.length*100)}%"></div></div>
    <div class="prog-lbl">${done}/${questions.length} besvarade</div>
  </div>
  <div class="q-card ${answered && res.correct ? 'ok-accent' : ''}">
    <div class="q-meta"><span class="chip chip-phys">Quizfråga ${done+1}</span></div>
    <div class="q-txt">${q.q}</div>
    <div class="options">
      ${q.opts.map((opt,i) => {
        const letter = LETTERS[i];
        const isChosen = answered && res.chosen === letter;
        const isCorrect = letter === q.correct;
        let cls = '';
        if (answered) {
          if (isChosen && isCorrect) cls = 'correct locked';
          else if (isChosen && !isCorrect) cls = 'wrong locked';
          else if (isCorrect) cls = 'show-correct locked';
          else cls = 'locked';
        }
        return `<button class="opt ${cls}" onclick="${answered ? '' : `quizPick('${q.id}','${letter}')`}">
          <div class="opt-letter">${answered&&isCorrect?'✓':answered&&isChosen&&!isCorrect?'✗':letter}</div>
          <div>${opt.replace(/^[A-D]\)\s*/,'')}</div>
        </button>`;
      }).join('')}
    </div>
    ${answered ? `
      <div class="fb ${res.correct ? 'ok' : 'err'}" style="margin-top:10px">
        <strong>${res.correct ? randFrom(PRAISE) : '❌ Inte rätt.'}</strong>
        ${q.explain}
      </div>
      <button class="btn btn-full" style="margin-top:10px" onclick="render()">NÄSTA →</button>` : ''}
  </div>`;
}

function quizPick(qid, letter) {
  const m = MOMENTS[GS.moment];
  const q = m.quiz.find(x => x.id === qid);
  GS.quizResults[qid] = { correct: letter === q.correct, chosen: letter };
  render();
}

function renderQuizReview(app) {
  const m = MOMENTS[GS.moment];
  const wrong = m.quiz.filter(q => GS.quizResults[q.id] && !GS.quizResults[q.id].correct);
  const LETTERS = ['A','B','C','D'];

  app.innerHTML = `
  <div class="sec-hd" style="margin-bottom:4px">📋 Quizresultat</div>
  <div class="sec-sub">Du hade ${wrong.length} fel. Repetera förklaringarna och gör om frågorna du missade.</div>
  ${m.quiz.map(q => {
    const res = GS.quizResults[q.id];
    const isOk = res?.correct;
    const chosenText = res ? q.opts.find(o => o.startsWith(res.chosen)) : '—';
    const correctText = q.opts.find(o => o.startsWith(q.correct));
    return `
    <div class="review-row">
      <div class="review-icon">${isOk?'✅':'❌'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px;margin-bottom:3px">${q.q}</div>
        ${isOk
          ? `<span class="sbadge sb-ok">✓ ${correctText}</span>`
          : `<span style="font-size:13px;color:var(--err);text-decoration:line-through">${chosenText}</span><br>
             <span class="sbadge sb-ok" style="margin-top:4px">✓ ${correctText}</span>
             <div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5">💡 ${q.explain}</div>`}
      </div>
    </div>`;
  }).join('')}
  <div class="btn-row" style="margin-top:16px">
    <button class="btn btn-full" onclick="retryWrongQuiz()">🔄 GÖR OM FELEN (${wrong.length} frågor)</button>
  </div>`;
}

function retryWrongQuiz() {
  const m = MOMENTS[GS.moment];
  GS.quizNeedsReview = m.quiz.filter(q => !GS.quizResults[q.id]?.correct).map(q => q.id);
  // Clear results for wrong ones only
  GS.quizNeedsReview.forEach(id => { GS.quizResults[id] = undefined; });
  GS.screen = 'quiz';
  render();
}

// ============================================================
// TEST
// ============================================================
function renderTest(app) {
  const m = MOMENTS[GS.moment];
  const toAnswer = m.test.filter(q => GS.testResults[q.id] === undefined);
  if (toAnswer.length === 0) {
    // All answered → show result
    GS.screen = 'testresult';
    render(); return;
  }
  const q = toAnswer[0];
  const done = m.test.length - toAnswer.length;
  const LETTERS = ['A','B','C','D'];

  app.innerHTML = `
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <span class="chip" style="background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)">📝 Prov</span>
    <span style="font-size:12px;color:var(--muted)">${m.title} · Godkänt ≥ 70%</span>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" style="width:${Math.round(done/m.test.length*100)}%;background:var(--gold)"></div></div>
    <div class="prog-lbl">${done}/${m.test.length}</div>
  </div>
  <div class="q-card">
    <div class="q-meta"><span class="chip chip-gold">Provfråga ${done+1}</span></div>
    <div class="q-txt">${q.q}</div>
    <div class="options">
      ${q.opts.map((opt,i) => {
        const letter = LETTERS[i];
        return `<button class="opt" onclick="testPick('${q.id}','${letter}')">${letter}. ${opt.replace(/^[A-D]\)\s*/,'')}</button>`;
      }).join('')}
    </div>
  </div>`;
}

function testPick(qid, letter) {
  const m = MOMENTS[GS.moment];
  const q = m.test.find(x => x.id === qid);
  GS.testResults[qid] = { correct: letter === q.correct, chosen: letter };
  render();
}

function renderTestResult(app) {
  const m = MOMENTS[GS.moment];
  const correct = m.test.filter(q => GS.testResults[q.id]?.correct).length;
  const total = m.test.length;
  const pct = Math.round(correct/total*100);
  const passed = pct >= 70;
  const wrong = m.test.filter(q => !GS.testResults[q.id]?.correct);
  const LETTERS = ['A','B','C','D'];

  if (passed && wrong.length === 0) {
    // Perfect or all retried — rank up!
    if (!GS.completedMoments.includes(m.id)) {
      addXP(XP_TEST_PASS);
      GS.completedMoments.push(m.id);
    }
    GS.screen = 'rankup';
    render(); return;
  }

  app.innerHTML = `
  <div class="card" style="text-align:center;padding:24px">
    <div class="score-c ${passed?'pass':'fail'}">
      <div class="score-pct">${pct}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:1px">${correct}/${total}</div>
    </div>
    <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${passed?'🎓 Godkänt!':'📚 Ej godkänt'}</h2>
    <p style="color:var(--muted);margin-top:6px;font-size:13px">${passed
      ? `Du klarade provet med ${pct}%! Nu ska du rätta dina fel för att befästa kunskapen.`
      : `Du fick ${pct}% — behöver 70% för godkänt. Läs förklaringarna och försök igen.`}</p>
  </div>

  <div class="sec-hd" style="margin:14px 0 4px">Genomgång — alla frågor</div>
  ${m.test.map(q => {
    const res = GS.testResults[q.id];
    const isOk = res?.correct;
    const chosenText = res ? q.opts.find(o => o.startsWith(res.chosen)) : '—';
    const correctText = q.opts.find(o => o.startsWith(q.correct));
    return `
    <div class="review-row">
      <div class="review-icon">${isOk?'✅':'❌'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px;margin-bottom:3px">${q.q}</div>
        ${isOk
          ? `<span class="sbadge sb-ok">✓ ${correctText}</span>`
          : `<span style="font-size:13px;color:var(--err);text-decoration:line-through">${chosenText}</span><br>
             <span class="sbadge sb-ok" style="margin-top:4px">✓ ${correctText}</span>
             <div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5">💡 ${q.explain}</div>`}
      </div>
      <span class="sbadge ${isOk?'sb-ok':'sb-err'}">${isOk?'RÄTT':'FEL'}</span>
    </div>`;
  }).join('')}

  <div class="btn-row" style="margin-top:16px">
    ${passed && wrong.length > 0
      ? `<button class="btn btn-full btn-ok" onclick="startTestRetry()">🔄 GÖR OM FELEN (${wrong.length} st) →</button>`
      : !passed
        ? `<button class="btn btn-full" onclick="GS.testResults={};GS.screen='test';render()">🔄 GÖR OM PROVET</button>`
        : ''}
  </div>`;
}

function startTestRetry() {
  const m = MOMENTS[GS.moment];
  GS.testNeedsRetry = m.test.filter(q => !GS.testResults[q.id]?.correct).map(q => q.id);
  GS.testRetryIdx = 0;
  GS.screen = 'testretry';
  render();
}

function renderTestRetry(app) {
  const m = MOMENTS[GS.moment];
  const toRetry = m.test.filter(q => GS.testNeedsRetry.includes(q.id));
  const current = toRetry[GS.testRetryIdx];

  if (!current) {
    // Handled in testRetryNext — shouldn't reach here, but safe fallback
    if (!GS.completedMoments.includes(m.id)) {
      addXP(XP_TEST_PASS);
      GS.completedMoments.push(m.id);
    }
    GS.screen = 'rankup';
    render(); return;
  }

  const res = GS.testResults[current.id];
  const answered = res && GS.testRetryAnswered;
  const LETTERS = ['A','B','C','D'];

  if (!answered) {
    app.innerHTML = `
    <div class="fb warn" style="margin-bottom:12px"><strong>🔄 Rätta dina fel</strong> — ${GS.testRetryIdx+1} av ${toRetry.length}</div>
    <div class="q-card">
      <div class="q-meta"><span class="chip chip-gold">Omgång</span></div>
      <div class="q-txt">${current.q}</div>
      <div class="options">
        ${current.opts.map((opt,i) => {
          const letter = LETTERS[i];
          return `<button class="opt" onclick="testRetryPick('${current.id}','${letter}')">${letter}. ${opt.replace(/^[A-D]\)\s*/,'')}</button>`;
        }).join('')}
      </div>
    </div>`;
  } else {
    const correct = res.correct;
    const chosenText = current.opts.find(o => o.startsWith(res.chosen));
    const correctText = current.opts.find(o => o.startsWith(current.correct));
    app.innerHTML = `
    <div class="q-card ${correct?'ok-accent':''}">
      <div class="q-txt">${current.q}</div>
      <div class="options">
        ${current.opts.map((opt,i) => {
          const letter = LETTERS[i];
          const isChosen = res.chosen===letter;
          const isCorrect = letter===current.correct;
          let cls = isChosen&&isCorrect?'correct locked':isChosen&&!isCorrect?'wrong locked':isCorrect?'show-correct locked':'locked';
          return `<button class="opt ${cls}"><div class="opt-letter">${isCorrect?'✓':isChosen?'✗':letter}</div><div>${opt.replace(/^[A-D]\)\s*/,'')}</div></button>`;
        }).join('')}
      </div>
      <div class="fb ${correct?'ok':'err'}" style="margin-top:10px">
        <strong>${correct ? randFrom(PRAISE)+' Rätt den här gången!' : '❌ Fortfarande fel.'}</strong>
        ${current.explain}
      </div>
      <button class="btn btn-full" style="margin-top:12px" onclick="testRetryNext()">
        ${GS.testRetryIdx+1<toRetry.length ? 'NÄSTA →' : '✅ KLARA MOMENT →'}
      </button>
    </div>`;
  }
}

function testRetryPick(qid, letter) {
  const m = MOMENTS[GS.moment];
  const q = m.test.find(x => x.id === qid);
  GS.testResults[qid] = { correct: letter === q.correct, chosen: letter };
  GS.testRetryAnswered = true;
  render();
}

function testRetryNext() {
  GS.testRetryIdx++;
  GS.testRetryAnswered = false;
  const m = MOMENTS[GS.moment];
  const toRetry = m.test.filter(q => GS.testNeedsRetry.includes(q.id));
  if (GS.testRetryIdx >= toRetry.length) {
    // All retried — go to rankup
    if (!GS.completedMoments.includes(m.id)) {
      addXP(XP_TEST_PASS);
      GS.completedMoments.push(m.id);
    }
    GS.screen = 'rankup';
  }
  render();
}

// ============================================================
// DONE SCREEN
// ============================================================
function renderDone(app) {
  const rank = getRank(GS.xp);
